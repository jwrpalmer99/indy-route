##
## ci.yml — Continuous integration: unit tests (Vitest) + integration tests
## (Playwright → Quench → Foundry VTT in Docker).
##
## Secrets required in repo Settings → Secrets → Actions:
##   FOUNDRY_LICENSE_KEY  — your 32-char Foundry license key
##   FOUNDRY_ADMIN_KEY    — admin panel password for the Docker container
##   FOUNDRY_USERNAME     — foundryvtt.com account email
##   FOUNDRY_PASSWORD     — foundryvtt.com account password
##

name: CI

on:
  push:
    branches: [main, dev, "feature/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from the Actions tab

# ---------------------------------------------------------------------------
# Job 1 — Unit tests (fast, no Docker needed)
# ---------------------------------------------------------------------------
jobs:
  unit-tests:
    name: Unit Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Generate coverage report
        run: npm run coverage

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

# ---------------------------------------------------------------------------
# Job 2 — Integration tests (Docker + Playwright + Quench)
# ---------------------------------------------------------------------------
  integration-tests:
    name: Integration Tests (Quench in Docker)
    runs-on: ubuntu-latest
    needs: unit-tests            # only run if unit tests pass

    ## Skip this job on forks (secrets not available to fork PRs)
    if: >
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Foundry VTT (Docker)
        run: |
          docker compose -f docker-compose.test.yml up -d
        env:
          FOUNDRY_LICENSE_KEY: ${{ secrets.FOUNDRY_LICENSE_KEY }}
          FOUNDRY_ADMIN_KEY:   ${{ secrets.FOUNDRY_ADMIN_KEY }}
          FOUNDRY_USERNAME:    ${{ secrets.FOUNDRY_USERNAME }}
          FOUNDRY_PASSWORD:    ${{ secrets.FOUNDRY_PASSWORD }}

      - name: Wait for Foundry to be ready
        run: npm run foundry:wait
        env:
          FOUNDRY_URL:          http://localhost:30000
          FOUNDRY_WAIT_TIMEOUT: "180"

      - name: Run Quench integration tests
        run: npm run test:integration
        env:
          FOUNDRY_URL:       http://localhost:30000
          FOUNDRY_ADMIN_KEY: ${{ secrets.FOUNDRY_ADMIN_KEY }}
          QUENCH_TIMEOUT_MS: "300000"

      - name: Stop Foundry
        if: always()
        run: docker compose -f docker-compose.test.yml down -v

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: playwright-traces/
          retention-days: 3
